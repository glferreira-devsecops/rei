<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="cheese" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="50%" stop-color="#FFC107"/>
      <stop offset="100%" stop-color="#FF8F00"/>
    </linearGradient>
    <linearGradient id="crust" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4A056"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="sauce" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF2A00"/>
      <stop offset="100%" stop-color="#CC1100"/>
    </linearGradient>
    <radialGradient id="glow-bg" cx="50%" cy="45%" r="55%">
      <stop offset="0%" stop-color="#1A1A1A"/>
      <stop offset="100%" stop-color="#0F0F0F"/>
    </radialGradient>
    <filter id="drop-shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#FF8F00" flood-opacity="0.3"/>
    </filter>
    <filter id="inner-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="circle-clip">
      <circle cx="256" cy="256" r="256"/>
    </clipPath>
  </defs>
  <!-- Fundo circular (sem borda retangular) -->
  <circle cx="256" cy="256" r="256" fill="url(#glow-bg)"/>
  <g clip-path="url(#circle-clip)">
    <!-- Fatia de Pizza com sombra -->
    <g filter="url(#drop-shadow)">
      <!-- Molho (camada base) -->
      <path d="M256 80 L420 400 Q340 440 256 440 Q172 440 92 400 Z" fill="url(#sauce)"/>
      <!-- Queijo derretendo -->
      <path d="M256 100 L400 380 Q330 420 256 420 Q182 420 112 380 Z" fill="url(#cheese)"/>
      <!-- Crosta dourada -->
      <path d="M92 400 Q172 440 256 440 Q340 440 420 400 L400 380 Q330 420 256 420 Q182 420 112 380 Z" fill="url(#crust)"/>
    </g>
    <!-- Calabresas com micro-highlights -->
    <circle cx="220" cy="220" r="30" fill="#CC1100" opacity="0.95"/>
    <circle cx="222" cy="216" r="6" fill="#FF4444" opacity="0.4"/>
    <circle cx="300" cy="250" r="28" fill="#CC1100" opacity="0.95"/>
    <circle cx="302" cy="246" r="5" fill="#FF4444" opacity="0.4"/>
    <circle cx="256" cy="340" r="26" fill="#CC1100" opacity="0.95"/>
    <circle cx="258" cy="336" r="5" fill="#FF4444" opacity="0.4"/>
    <circle cx="180" cy="310" r="24" fill="#CC1100" opacity="0.95"/>
    <circle cx="330" cy="330" r="22" fill="#CC1100" opacity="0.95"/>
    <!-- Brilhos glossy premium (glassmorphism) -->
    <ellipse cx="240" cy="190" rx="18" ry="8" fill="#FFF8E1" opacity="0.35" transform="rotate(-25 240 190)"/>
    <ellipse cx="290" cy="290" rx="12" ry="5" fill="#FFF8E1" opacity="0.25" transform="rotate(-20 290 290)"/>
    <circle cx="200" cy="300" r="4" fill="#FFFFFF" opacity="0.3"/>
    <circle cx="340" cy="350" r="3" fill="#FFFFFF" opacity="0.2"/>
  </g>
</svg>
